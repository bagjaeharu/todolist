<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>온라인영업팀 To-do List</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <!-- Firebase SDK -->

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nanum Gothic', sans-serif;
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header-subtitle {
            opacity: 0.9;
            font-size: 0.95em;
        }

        .main-content {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: calc(100vh - 200px);
        }

        .sidebar {
            background: #f3f4f6;
            border-right: 1px solid #e5e7eb;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar h3 {
            color: #1f2937;
            font-size: 0.95em;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
        }

        .project-list {
            list-style: none;
            margin-bottom: 20px;
        }

        .project-item {
            padding: 12px;
            margin-bottom: 8px;
            background: white;
            border-left: 4px solid #d1d5db;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
            font-size: 0.9em;
        }

        .project-item:hover {
            background: #f0f4f8;
            border-left-color: #2563eb;
        }

        .project-item.active {
            background: #2563eb;
            color: white;
            border-left-color: #2563eb;
            font-weight: 700;
        }

        .add-project-btn {
            width: 100%;
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Nanum Gothic', sans-serif;
            transition: background 0.3s;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .add-project-btn:hover {
            background: #1d4ed8;
        }

        .content-area {
            padding: 30px;
            overflow-y: auto;
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e5e7eb;
        }

        .project-header h2 {
            color: #1f2937;
            font-size: 1.8em;
            font-weight: 700;
        }

        .project-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 700;
            font-family: 'Nanum Gothic', sans-serif;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-secondary {
            background: #6b7280;
            color: white;
        }

        .btn-secondary:hover {
            background: #4b5563;
        }

        .btn-search {
            background: #16a34a;
            color: white;
        }

        .btn-search:hover {
            background: #15803d;
        }

        .filters-section {
            background: #f3f4f6;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .filters-title {
            font-size: 1em;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 15px;
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-group label {
            font-size: 0.9em;
            font-weight: 700;
            color: #1f2937;
        }

        .filter-group select {
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-size: 0.9em;
            font-family: 'Nanum Gothic', sans-serif;
        }

        .filter-group select:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border-left: 4px solid #2563eb;
        }

        .stat-card h4 {
            color: #6b7280;
            font-size: 0.85em;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .stat-card .number {
            font-size: 2em;
            font-weight: 700;
            color: #2563eb;
        }

        .task-row {
            padding: 12px 15px;
            border: 1px solid #e5e7eb;
            margin-bottom: 12px;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: grid;
            grid-template-columns: 120px 150px 300px 100px;
            gap: 10px;
            align-items: center;
        }

        .task-row:hover {
            background: #f9fafb;
            border-color: #2563eb;
        }

        .task-cell {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.9em;
        }

        .task-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 700;
            text-align: center;
            display: inline-block;
        }

        .status-완료 {
            background: #d1fae5;
            color: #065f46;
        }

        .status-진행중 {
            background: #dbeafe;
            color: #0c4a6e;
        }

        .status-예정 {
            background: #fef3c7;
            color: #78350f;
        }

        .task-details {
            display: none;
            background: #f9fafb;
            padding: 20px;
            border: 1px solid #e5e7eb;
            border-top: none;
            margin: -1px 0 12px 0;
            border-radius: 0 0 6px 6px;
            grid-column: 1 / -1;
        }

        .task-details.show {
            display: block;
        }

        .expand-icon {
            display: inline-block;
            margin-right: 8px;
            transition: transform 0.3s;
        }

        .task-row.expanded .expand-icon {
            transform: rotate(180deg);
        }

        .progress-item {
            background: white;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            border: 1px solid #e5e7eb;
            border-left: 3px solid #2563eb;
        }

        .progress-item-content {
            color: #374151;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.6;
            margin-bottom: 12px;
            padding: 10px;
            background: #f3f4f6;
            border-radius: 4px;
        }

        .progress-item-dates {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .progress-item-date {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .progress-item-date label {
            font-size: 0.8em;
            font-weight: 700;
            color: #6b7280;
        }

        .progress-item-date input {
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-size: 0.9em;
            font-family: 'Nanum Gothic', sans-serif;
        }

        .progress-item-date input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .add-progress-btn {
            display: block;
            margin-top: 15px;
            padding: 10px 16px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Nanum Gothic', sans-serif;
            font-size: 0.9em;
        }

        .add-progress-btn:hover {
            background: #1d4ed8;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-header {
            font-size: 1.5em;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #1f2937;
            font-weight: 700;
            font-size: 0.9em;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-size: 0.9em;
            font-family: 'Nanum Gothic', sans-serif;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
            justify-content: flex-end;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }

        .empty-state h3 {
            color: #6b7280;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .color-palette {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .color-option:hover {
            border-color: #1f2937;
        }

        .color-option.selected {
            border-color: #1f2937;
            box-shadow: 0 0 0 2px white, 0 0 0 4px #1f2937;
        }

        .result-count {
            padding: 10px;
            background: #dbeafe;
            border-radius: 4px;
            margin-bottom: 20px;
            color: #0c4a6e;
            font-weight: 700;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.85em;
        }

        .task-list {
            display: grid;
            gap: 0;
        }

        .task-summary {
            display: grid;
            grid-template-columns: 150px 150px;
            gap: 15px;
            margin-bottom: 20px;
        }

        .task-summary-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .task-summary-label {
            font-weight: 700;
            color: #6b7280;
            font-size: 0.8em;
        }

        .task-summary-value {
            color: #1f2937;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .task-row {
                grid-template-columns: 80px 80px 150px 80px;
            }

            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }

            header h1 {
                font-size: 1.5em;
            }

            .project-header h2 {
                font-size: 1.3em;
            }

            .progress-item-dates {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 온라인영업팀 To-do List</h1>
            <p class="header-subtitle">팀 프로젝트 과제 관리 및 진행 상황 공유</p>
        </header>

        <div class="main-content">
            <div class="sidebar">
                <button class="add-project-btn" onclick="openProjectModal()">+ 프로젝트 추가</button>
                <h3>프로젝트</h3>
                <ul class="project-list" id="projectList"></ul>

                <h3>추가 기능</h3>
                <button class="add-project-btn" onclick="openExportModal()" style="background: #16a34a;">📊 엑셀 추출</button>
            </div>

            <div class="content-area">
                <div class="project-header">
                    <h2 id="currentProjectName">프로젝트를 선택하세요</h2>
                    <div class="project-actions">
                        <button class="btn btn-primary" onclick="openTaskModal()">+ 과제 추가</button>
                        <button class="btn btn-secondary" onclick="editCurrentProject()">프로젝트 편집</button>
                        <button class="btn btn-danger" onclick="deleteCurrentProject()">프로젝트 삭제</button>
                    </div>
                </div>

                <div id="projectContent"></div>
            </div>
        </div>
    </div>

    <!-- Project Modal -->
    <div class="modal" id="projectModal">
        <div class="modal-content">
            <div class="modal-header">프로젝트 추가/편집</div>
            <form id="projectForm">
                <div class="form-group">
                    <label for="projectName">프로젝트명 *</label>
                    <input type="text" id="projectName" required>
                </div>
                <div class="form-group">
                    <label for="projectDescription">설명</label>
                    <textarea id="projectDescription"></textarea>
                </div>
                <div class="form-group">
                    <label>프로젝트 색상</label>
                    <div class="color-palette" id="projectColorPalette">
                        <!-- 빨강 계열 -->
                        <div class="color-option" style="background: #ef4444;" data-color="#ef4444"></div>
                        <div class="color-option" style="background: #dc2626;" data-color="#dc2626"></div>
                        <div class="color-option" style="background: #991b1b;" data-color="#991b1b"></div>
                        <!-- 주황 계열 -->
                        <div class="color-option" style="background: #f97316;" data-color="#f97316"></div>
                        <div class="color-option" style="background: #ea580c;" data-color="#ea580c"></div>
                        <div class="color-option" style="background: #9a3412;" data-color="#9a3412"></div>
                        <!-- 노랑 계열 -->
                        <div class="color-option" style="background: #eab308;" data-color="#eab308"></div>
                        <div class="color-option" style="background: #ca8a04;" data-color="#ca8a04"></div>
                        <div class="color-option" style="background: #854d0e;" data-color="#854d0e"></div>
                        
                        <!-- 초록 계열 -->
                        <div class="color-option" style="background: #16a34a;" data-color="#16a34a"></div>
                        <div class="color-option" style="background: #15803d;" data-color="#15803d"></div>
                        <div class="color-option" style="background: #166534;" data-color="#166534"></div>
                        <!-- 시안 계열 -->
                        <div class="color-option" style="background: #06b6d4;" data-color="#06b6d4"></div>
                        <div class="color-option" style="background: #0891b2;" data-color="#0891b2"></div>
                        <div class="color-option" style="background: #0e7490;" data-color="#0e7490"></div>
                        <!-- 파랑 계열 -->
                        <div class="color-option" style="background: #2563eb;" data-color="#2563eb"></div>
                        <div class="color-option" style="background: #1d4ed8;" data-color="#1d4ed8"></div>
                        <div class="color-option" style="background: #1e40af;" data-color="#1e40af"></div>
                        
                        <!-- 보라 계열 -->
                        <div class="color-option" style="background: #a855f7;" data-color="#a855f7"></div>
                        <div class="color-option" style="background: #9333ea;" data-color="#9333ea"></div>
                        <div class="color-option" style="background: #7e22ce;" data-color="#7e22ce"></div>
                        <!-- 핑크 계열 -->
                        <div class="color-option" style="background: #ec4899;" data-color="#ec4899"></div>
                        <div class="color-option" style="background: #db2777;" data-color="#db2777"></div>
                        <div class="color-option" style="background: #be185d;" data-color="#be185d"></div>
                        <!-- 회색 계열 -->
                        <div class="color-option" style="background: #6b7280;" data-color="#6b7280"></div>
                        <div class="color-option" style="background: #4b5563;" data-color="#4b5563"></div>
                        <div class="color-option" style="background: #374151;" data-color="#374151"></div>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('projectModal')">취소</button>
                    <button type="submit" class="btn btn-primary">저장</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Export Modal -->
    <div class="modal" id="exportModal">
        <div class="modal-content">
            <div class="modal-header">CSV 내보내기</div>
            <form id="exportForm">
                <div class="form-group">
                    <label for="exportProject">프로젝트 선택 *</label>
                    <select id="exportProject" required>
                        <option value="">프로젝트를 선택하세요</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('exportModal')">취소</button>
                    <button type="submit" class="btn btn-search">📥 다운로드</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Task Modal -->
    <div class="modal" id="taskModal">
        <div class="modal-content">
            <div class="modal-header">과제 추가/편집</div>
            <form id="taskForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="taskCategory1">구분1 *</label>
                        <input type="text" id="taskCategory1" required>
                    </div>
                    <div class="form-group">
                        <label for="taskCategory2">구분2 *</label>
                        <input type="text" id="taskCategory2" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="taskTitle">과제명 *</label>
                    <input type="text" id="taskTitle" required>
                </div>
                <div class="form-group">
                    <label for="taskAssignee">담당자 *</label>
                    <input type="text" id="taskAssignee" required>
                </div>
                <div class="form-group">
                    <label for="taskNotes">비고</label>
                    <input type="text" id="taskNotes">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="taskStatus">진행상황 *</label>
                        <select id="taskStatus" required>
                            <option value="예정">예정</option>
                            <option value="진행중">진행중</option>
                            <option value="완료">완료</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="taskProgress">진행률 (%)</label>
                        <input type="number" id="taskProgress" min="0" max="100" value="0">
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('taskModal')">취소</button>
                    <button type="submit" class="btn btn-primary">저장</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ==========================================
        // 📌 Firebase 설정 (STEP 1: 아래 3가지만 수정하세요!)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDUt7Gl6KPZDBK5YT5J-GU2hSKIEXma5W4",
            authDomain: "todolist-7444b.firebaseapp.com",
            databaseURL: "https://todolist-7444b-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "todolist-7444b",
            storageBucket: "todolist-7444b.firebasestorage.app",
            messagingSenderId: "718944405362",
            appId: "1:718944405362:web:5dbd1f2c3e4911b9f67feb"
        };

        // Firebase 초기화
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        // 현재 사용자 ID (고유한 값)
        let currentUserId = localStorage.getItem('userId') || 'user_' + Date.now();
        localStorage.setItem('userId', currentUserId);
        console.log('사용자 ID:', currentUserId);

        // ==========================================
        
        let projects = [];
        let currentProjectId = null;
        let editingTaskId = null;
        let editingProjectId = null;

        // 초기화
        function init() {
            console.log('초기화 시작...');
            loadFromFirebase();
            console.log('저장된 프로젝트:', projects.length);
            
            if (projects.length === 0) {
                console.log('샘플 데이터 추가...');
                addSampleData();
            }
            
            console.log('프로젝트 목록 렌더링...');
            renderProjectList();
            setupColorPalettes();
            
            if (projects.length > 0) {
                currentProjectId = projects[0].id;
                console.log('선택된 프로젝트:', currentProjectId);
                renderContent();
            }
        }

        function addSampleData() {
            const now = Date.now();
            projects = [
                {
                    id: now + 1,

                        { id: now + 1002, category1: '계약', category2: '택배/물류', title: '택배계약 견적서 업데이트', assignee: '박재용', progressItems: [{ id: 1, content: '택배계약 + 물류견적서 업데이트', startDate: '', endDate: '' }], notes: '', status: '진행중', progress: 70 },
                        { id: now + 1003, category1: '업무환경', category2: 'CJ대한통운', title: '업무공간 실사', assignee: '박재용', progressItems: [{ id: 1, content: '업무공간 실사 진행', startDate: '2026-06-16', endDate: '2026-06-16' }], notes: '', status: '완료', progress: 100 },
                        { id: now + 1004, category1: '업무환경', category2: 'PS&M', title: '군포 망구축 공사', assignee: '박재용', progressItems: [{ id: 1, content: '군포 망구축 공사 품의', startDate: '', endDate: '' }], notes: '', status: '진행중', progress: 60 }
                    ]

                        { id: now + 2002, category1: '업무환경', category2: '공간확보', title: '1층 공간 부래당 확인', assignee: '박재용', progressItems: [{ id: 1, content: '공간 확인 및 협의', startDate: '', endDate: '' }], notes: '', status: '진행중', progress: 70 }
                    ]
                },
                {
                    id: now + 3,
                    name: '(3) 상담/라이브챗',
                    color: '#0369a1',
                    tasks: [
                        { id: now + 3001, category1: '계약', category2: '연장', title: '1년 연장 계약', assignee: '영업팀', progressItems: [{ id: 1, content: '연장 계약 진행', startDate: '', endDate: '' }], notes: '', status: '예정', progress: 0 }
                    ]
                }
            ];
            saveToStorage();
        }

        function renderProjectList() {
            const list = document.getElementById('projectList');
            list.innerHTML = projects.map(p => `
                <li class="project-item ${currentProjectId === p.id ? 'active' : ''}" 
                    onclick="selectProject(${p.id})"
                    style="border-left-color: ${p.color}">
                    ${p.name}
                </li>
            `).join('');
        }

        function selectProject(projectId) {
            currentProjectId = projectId;
            renderProjectList();
            renderContent();
        }

        function renderContent() {
            const project = projects.find(p => p.id === currentProjectId);
            if (!project) return;

            document.getElementById('currentProjectName').textContent = project.name;
            
            const tasks = project.tasks || [];
            const completed = tasks.filter(t => t.status === '완료').length;
            const inProgress = tasks.filter(t => t.status === '진행중').length;
            const avgProgress = tasks.length > 0 ? Math.round(tasks.reduce((sum, t) => sum + (t.progress || 0), 0) / tasks.length) : 0;

            let html = `
                <div class="stats-bar">
                    <div class="stat-card"><h4>전체 과제</h4><div class="number">${tasks.length}</div></div>
                    <div class="stat-card"><h4>완료</h4><div class="number">${completed}</div></div>
                    <div class="stat-card"><h4>진행중</h4><div class="number">${inProgress}</div></div>
                    <div class="stat-card"><h4>평균 진행률</h4><div class="number">${avgProgress}%</div></div>
                </div>

                <div class="filters-section">
                    <div class="filters-title">🔍 과제 필터링</div>
                    <div class="filters">
                        <div class="filter-group">
                            <label>담당자</label>
                            <select id="filterAssignee" onchange="applyFilters()">
                                <option value="">전체</option>
                                ${[...new Set(tasks.map(t => t.assignee))].map(a => `<option value="${a}">${a}</option>`).join('')}
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>진행상황</label>
                            <select id="filterStatus" onchange="applyFilters()">
                                <option value="">전체</option>
                                ${[...new Set(tasks.map(t => t.status))].map(s => `<option value="${s}">${s}</option>`).join('')}
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>구분1</label>
                            <select id="filterCategory1" onchange="applyFilters()">
                                <option value="">전체</option>
                                ${[...new Set(tasks.map(t => t.category1))].map(c => `<option value="${c}">${c}</option>`).join('')}
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>구분2</label>
                            <select id="filterCategory2" onchange="applyFilters()">
                                <option value="">전체</option>
                                ${[...new Set(tasks.map(t => t.category2))].map(c => `<option value="${c}">${c}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                    <div class="filter-buttons">
                        <button class="btn btn-search" onclick="applyFilters()">🔎 조회</button>
                        <button class="btn btn-secondary" onclick="resetFilters()">초기화</button>
                    </div>
                </div>

                <div id="resultInfo"></div>
                <div class="task-list" id="taskList"></div>
            `;

            document.getElementById('projectContent').innerHTML = html;
            applyFilters();
        }

        function applyFilters() {
            const project = projects.find(p => p.id === currentProjectId);
            const tasks = project.tasks || [];
            
            const assigneeFilter = document.getElementById('filterAssignee').value;
            const statusFilter = document.getElementById('filterStatus').value;
            const category1Filter = document.getElementById('filterCategory1').value;
            const category2Filter = document.getElementById('filterCategory2').value;

            let filtered = tasks.filter(t => 
                (!assigneeFilter || t.assignee === assigneeFilter) &&
                (!statusFilter || t.status === statusFilter) &&
                (!category1Filter || t.category1 === category1Filter) &&
                (!category2Filter || t.category2 === category2Filter)
            );

            document.getElementById('resultInfo').innerHTML = `<div class="result-count">검색 결과: <strong>${filtered.length}</strong>개의 과제</div>`;

            let html = '';
            filtered.forEach(task => {
                const progressItems = task.progressItems || [];
                html += `
                    <div class="task-row" onclick="toggleExpand(this)">
                        <div class="task-cell"><span class="expand-icon">▼</span>${task.category1}</div>
                        <div class="task-cell">${task.category2}</div>
                        <div class="task-cell"><strong>${task.title}</strong></div>
                        <div class="task-cell"><span class="task-status status-${task.status}">${task.status}</span></div>
                        <div class="task-details">
                            <div class="task-summary">
                                <div class="task-summary-item">
                                    <div class="task-summary-label">담당자</div>
                                    <div class="task-summary-value">${task.assignee}</div>
                                </div>
                                <div class="task-summary-item">
                                    <div class="task-summary-label">진행률</div>
                                    <div class="task-summary-value">${task.progress}%</div>
                                </div>
                            </div>

                            <h4 style="font-weight: 700; margin-bottom: 12px; color: #1f2937;">📝 진행 내용</h4>
                            ${progressItems.map((item, idx) => `
                                <div class="progress-item">
                                    <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                                        <div>#${idx + 1}</div>
                                        <button type="button" class="btn btn-sm btn-danger" onclick="event.stopPropagation(); deleteProgressItem(${task.id}, ${item.id})">삭제</button>
                                    </div>
                                    <div class="progress-item-content">${item.content}</div>
                                    <div class="progress-item-dates">
                                        <div class="progress-item-date">
                                            <label>시작일</label>
                                            <input type="date" value="${item.startDate}" onclick="event.stopPropagation()" onchange="updateProgressDate(${task.id}, ${item.id}, 'startDate', this.value)">
                                        </div>
                                        <div class="progress-item-date">
                                            <label>종료일</label>
                                            <input type="date" value="${item.endDate}" onclick="event.stopPropagation()" onchange="updateProgressDate(${task.id}, ${item.id}, 'endDate', this.value)">
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                            <button type="button" class="add-progress-btn" onclick="event.stopPropagation(); addProgressItem(${task.id})">+ 진행 내용 추가</button>

                            ${task.notes ? `<div style="margin-top: 20px;"><h4 style="font-weight: 700; color: #1f2937;">📌 비고</h4><div style="padding: 10px; background: #f3f4f6; border-radius: 4px;">${task.notes}</div></div>` : ''}

                            <div style="border-top: 1px solid #e5e7eb; margin-top: 15px; padding-top: 15px;">
                                <button type="button" class="btn btn-sm btn-secondary" onclick="event.stopPropagation(); editTask(${task.id})">편집</button>
                                <button type="button" class="btn btn-sm btn-danger" onclick="event.stopPropagation(); deleteTask(${task.id})">삭제</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            if (filtered.length === 0) {
                html = '<div class="empty-state"><h3>검색 결과가 없습니다</h3></div>';
            }

            document.getElementById('taskList').innerHTML = html;
        }

        function toggleExpand(element) {
            const details = element.querySelector('.task-details');
            const allDetails = document.querySelectorAll('.task-details');
            allDetails.forEach(d => {
                if (d !== details) {
                    d.classList.remove('show');
                    d.parentElement.classList.remove('expanded');
                }
            });
            details.classList.toggle('show');
            element.classList.toggle('expanded');
        }

        function resetFilters() {
            document.getElementById('filterAssignee').value = '';
            document.getElementById('filterStatus').value = '';
            document.getElementById('filterCategory1').value = '';
            document.getElementById('filterCategory2').value = '';
            applyFilters();
        }

        function addProgressItem(taskId) {
            const project = projects.find(p => p.id === currentProjectId);
            const task = project.tasks.find(t => t.id === taskId);
            const newId = Math.max(...task.progressItems.map(p => p.id), 0) + 1;
            task.progressItems.push({ id: newId, content: '', startDate: '', endDate: '' });
            saveToStorage();
            applyFilters();
        }

        function deleteProgressItem(taskId, itemId) {
            const project = projects.find(p => p.id === currentProjectId);
            const task = project.tasks.find(t => t.id === taskId);
            task.progressItems = task.progressItems.filter(p => p.id !== itemId);
            saveToStorage();
            applyFilters();
        }

        function updateProgressDate(taskId, itemId, field, value) {
            const project = projects.find(p => p.id === currentProjectId);
            const task = project.tasks.find(t => t.id === taskId);
            const item = task.progressItems.find(p => p.id === itemId);
            item[field] = value;
            saveToStorage();
        }

        function openProjectModal() {
            editingProjectId = null;
            document.getElementById('projectForm').reset();
            document.querySelectorAll('#projectColorPalette .color-option').forEach((o, i) => {
                o.classList.toggle('selected', i === 0);
            });
            document.getElementById('projectModal').classList.add('active');
        }

        function openExportModal() {
            const select = document.getElementById('exportProject');
            select.innerHTML = '<option value="">프로젝트를 선택하세요</option>';
            projects.forEach(p => {
                const option = document.createElement('option');
                option.value = p.id;
                option.textContent = p.name;
                select.appendChild(option);
            });
            document.getElementById('exportModal').classList.add('active');
        }

        function openTaskModal() {
            if (!currentProjectId) {
                alert('먼저 프로젝트를 선택하세요');
                return;
            }
            editingTaskId = null;
            document.getElementById('taskForm').reset();
            document.getElementById('taskProgress').value = 0;
            document.getElementById('taskStatus').value = '예정';
            document.getElementById('taskModal').classList.add('active');
        }

        function editTask(taskId) {
            editingTaskId = taskId;
            const project = projects.find(p => p.id === currentProjectId);
            const task = project.tasks.find(t => t.id === taskId);
            
            document.getElementById('taskCategory1').value = task.category1;
            document.getElementById('taskCategory2').value = task.category2;
            document.getElementById('taskTitle').value = task.title;
            document.getElementById('taskAssignee').value = task.assignee;
            document.getElementById('taskNotes').value = task.notes || '';
            document.getElementById('taskStatus').value = task.status;
            document.getElementById('taskProgress').value = task.progress || 0;
            
            document.getElementById('taskModal').classList.add('active');
        }

        function deleteTask(taskId) {
            if (!confirm('정말 삭제하시겠습니까?')) return;
            const project = projects.find(p => p.id === currentProjectId);
            project.tasks = project.tasks.filter(t => t.id !== taskId);
            saveToStorage();
            applyFilters();
        }

        function editCurrentProject() {
            if (!currentProjectId) return;
            editingProjectId = currentProjectId;
            const project = projects.find(p => p.id === currentProjectId);
            document.getElementById('projectName').value = project.name;
            document.getElementById('projectDescription').value = project.description || '';
            document.querySelectorAll('#projectColorPalette .color-option').forEach(o => {
                o.classList.toggle('selected', o.dataset.color === project.color);
            });
            document.getElementById('projectModal').classList.add('active');
        }

        function deleteCurrentProject() {
            if (!currentProjectId || !confirm('정말 삭제하시겠습니까?')) return;
            projects = projects.filter(p => p.id !== currentProjectId);
            currentProjectId = projects.length > 0 ? projects[0].id : null;
            saveToStorage();
            renderProjectList();
            if (currentProjectId) renderContent();
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function setupColorPalettes() {
            document.querySelectorAll('.color-palette').forEach(palette => {
                palette.querySelectorAll('.color-option').forEach(option => {
                    option.addEventListener('click', function() {
                        palette.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
                        this.classList.add('selected');
                    });
                });
            });
        }

        document.getElementById('projectForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const selectedColor = document.querySelector('#projectColorPalette .color-option.selected')?.dataset.color || '#2563eb';
            
            if (editingProjectId) {
                const project = projects.find(p => p.id === editingProjectId);
                project.name = document.getElementById('projectName').value;
                project.description = document.getElementById('projectDescription').value;
                project.color = selectedColor;
            } else {
                projects.push({
                    id: Date.now(),
                    name: document.getElementById('projectName').value,
                    description: document.getElementById('projectDescription').value,
                    color: selectedColor,
                    tasks: []
                });
                currentProjectId = projects[projects.length - 1].id;
            }
            saveToStorage();
            renderProjectList();
            renderContent();
            closeModal('projectModal');
        });

        document.getElementById('taskForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const project = projects.find(p => p.id === currentProjectId);
            
            const taskData = {
                category1: document.getElementById('taskCategory1').value,
                category2: document.getElementById('taskCategory2').value,
                title: document.getElementById('taskTitle').value,
                assignee: document.getElementById('taskAssignee').value,
                notes: document.getElementById('taskNotes').value,
                status: document.getElementById('taskStatus').value,
                progress: parseInt(document.getElementById('taskProgress').value)
            };

            if (editingTaskId) {
                const task = project.tasks.find(t => t.id === editingTaskId);
                Object.assign(task, taskData);
            } else {
                project.tasks.push({
                    id: Date.now(),
                    ...taskData,
                    progressItems: [{ id: 1, content: '', startDate: '', endDate: '' }]
                });
            }
            saveToStorage();
            renderContent();
            closeModal('taskModal');
        });

        document.getElementById('exportForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const projectId = parseInt(document.getElementById('exportProject').value);
            const project = projects.find(p => p.id === projectId);
            
            if (!project) {
                alert('프로젝트를 선택하세요');
                return;
            }

            // 엑셀 데이터 준비
            const excelData = [];
            const headers = ['구분1', '구분2', '과제명', '담당자', '진행내용', '시작일', '종료일', '비고', '진행상황', '진행률'];
            excelData.push(headers);
            
            project.tasks.forEach(task => {
                (task.progressItems || []).forEach(item => {
                    excelData.push([
                        task.category1,
                        task.category2,
                        task.title,
                        task.assignee,
                        item.content || '',
                        item.startDate || '',
                        item.endDate || '',
                        task.notes || '',
                        task.status,
                        task.progress
                    ]);
                });
            });

            // SheetJS를 사용하여 엑셀 파일 생성
            const ws = XLSX.utils.aoa_to_sheet(excelData);
            
            // 열 너비 설정
            const colWidths = [12, 12, 20, 12, 20, 12, 12, 15, 12, 8];
            ws['!cols'] = colWidths.map(w => ({ wch: w }));
            
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '과제목록');
            
            // 파일명 설정 (날짜 포함)
            const fileName = `${project.name}_${new Date().toISOString().slice(0, 10)}.xlsx`;
            XLSX.writeFile(wb, fileName);
            
            closeModal('exportModal');
        });

        function saveToFirebase() {
            const userRef = database.ref(`users/${currentUserId}/projects`);
            userRef.set(projects)
                .then(() => {
                    console.log('Firebase에 저장 완료');
                })
                .catch((error) => {
                    console.error('Firebase 저장 실패:', error);
                    alert('저장에 실패했습니다. 인터넷 연결을 확인하세요.');
                });
        }

        function loadFromFirebase() {
            const userRef = database.ref(`users/${currentUserId}/projects`);
            
            // 초기 로드
            userRef.once('value')
                .then((snapshot) => {
                    if (snapshot.exists()) {
                        projects = snapshot.val();
                        console.log('Firebase에서 로드 완료:', projects.length);
                    } else {
                        console.log('저장된 프로젝트가 없습니다');
                        projects = [];
                    }
                    renderProjectList();
                    if (currentProjectId) {
                        renderContent();
                    }
                })
                .catch((error) => {
                    console.error('Firebase 로드 실패:', error);
                    alert('데이터 로드에 실패했습니다. 잠시 후 다시 시도하세요.');
                });
            
            // 실시간 동기화 (다른 기기에서 변경되면 자동 반영)
            userRef.on('value', (snapshot) => {
                if (snapshot.exists()) {
                    const remoteProjects = snapshot.val();
                    // 현재 프로젝트가 있다면 유지하고 목록만 업데이트
                    if (JSON.stringify(projects) !== JSON.stringify(remoteProjects)) {
                        projects = remoteProjects;
                        console.log('실시간 동기화됨');
                        renderProjectList();
                        renderContent();
                    }
                }
            });
        }

        // 모든 저장 함수 변경
        // saveToStorage() 호출되는 곳을 saveToFirebase()로 변경
        const originalSaveToStorage = saveToFirebase;
        window.saveToStorage = saveToFirebase;

        // 페이지 로드 시 초기화
        window.addEventListener('load', init);
    </script>
<script src="https://www.gstatic.com/firebaseapp/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebaseapp/10.7.0/firebase-database-compat.js"></script>
